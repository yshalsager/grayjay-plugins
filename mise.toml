[tools]
node = "24"
pnpm = "11"
lefthook = "2"

[tasks.dev]
description = "Serve Grayjay plugins locally"
run = "pnpm run dev"

[tasks.validate]
description = "Validate plugin scripts and configs"
run = "pnpm run validate"

[tasks.format]
description = "Format project files"
run = "pnpm run format"

[tasks.format-check]
description = "Check project formatting"
run = "pnpm run format:check"

[tasks.lint]
description = "Lint project JavaScript"
run = "pnpm run lint"

[tasks.check]
description = "Run format, lint, and validation checks"
run = "pnpm run check"

[tasks.scaffold]
description = "Scaffold a new Grayjay plugin"
run = "pnpm run scaffold --"

[tasks.grayjay-desktop-dev-mode]
description = "Enable Grayjay Desktop developer mode"
run = "mkdir -p \"$HOME/Library/Application Support/Grayjay\" && touch \"$HOME/Library/Application Support/Grayjay/DEV\""

[tasks.grayjay-desktop-port]
description = "Print Grayjay Desktop local server port"
run = 'printf "%s\n" "$(cat "$HOME/Library/Application Support/Grayjay/port")"'

[tasks.grayjay-desktop-dev]
description = "Open Grayjay Desktop Developer Portal"
run = '''
port="$(mise run grayjay-desktop-port)"
printf "Developer Portal:\nhttp://127.0.0.1:%s/Developer/Index\n\n" "$port"
printf "Plugin config URLs:\n"
find plugins -mindepth 2 -maxdepth 2 -name '*Config.json' -print | sort | while IFS= read -r config; do
  printf "http://127.0.0.1:3000/%s\n" "$config"
done
open "http://127.0.0.1:$port/Developer/Index"
'''

[tasks.grayjay-desktop-server-unsafe]
description = "Start Grayjay Desktop server mode without token security for local debugging"
run = '''
if [ "$(uname)" = "Darwin" ]; then
  if [ -d /Applications/Grayjay.app ]; then
    open -n /Applications/Grayjay.app --args --server --ignore-security
  else
    open -n -a "Grayjay" --args --server --ignore-security
  fi
else
  "${GRAYJAY_DESKTOP_BIN:-Grayjay}" --server --ignore-security
fi

printf "Grayjay Desktop server URL:\nhttp://127.0.0.1:11338\n"
'''

[tasks.grayjay-load-dev-plugin]
description = "Load a local dev plugin into Grayjay Desktop server mode"
run = "node scripts/load-grayjay-dev-plugin.mjs"

[tasks.bump]
description = "Bump plugin config versions"
run = "pnpm run bump"

[tasks.sign]
description = "Sign plugin scripts"
run = "pnpm run sign"

[tasks.sign-bump]
description = "Bump plugin config versions and sign scripts"
run = "pnpm run sign-bump"
